{% extends 'todo/base.html' %}

{% block content %}

<h2>{% if task %}Edit {% else %}Add {% endif %} Task</h2>
{% if error %} <div class="alert alert-danger">{{ error }}</div> {% endif %}
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input class="form-control" type="text" name="title" value="{{ task.title }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" rows="3">{{ task.description }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'todo:task_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
